name: ios_apn_manager
description: "Minimal iOS-only Flutter plugin for APNs push notification token registration and notification routing. No Firebase required."
version: 1.0.0

environment:
  sdk: ^3.9.0
  flutter: '>=3.3.0'

dependencies:
  flutter:
    sdk: flutter
  plugin_platform_interface: ^2.0.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0

flutter:
  plugin:
    platforms:
      ios:
        pluginClass: IosApnManagerPlugin
