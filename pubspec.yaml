name: ios_apn_manager
description: "Minimal push manager — APNs on iOS, FCM HTTP v1 on Android. Native code only, no Flutter Firebase plugins. Name is historical (started iOS-only)."
version: 1.1.0

environment:
  sdk: ^3.9.0
  flutter: '>=3.3.0'

dependencies:
  flutter:
    sdk: flutter
  plugin_platform_interface: ^2.0.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  lints: ^5.0.0

flutter:
  plugin:
    platforms:
      ios:
        pluginClass: IosApnManagerPlugin
      android:
        package: app.erohub.push
        pluginClass: ErohubPushPlugin
